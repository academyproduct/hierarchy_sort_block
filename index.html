<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hierarchy Sorter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Hierarchy Sorter</h1>
    <div class="controls">
      <button id="reset-btn" title="Reset all images to the pool">Reset</button>
    </div>
  </header>

  <main>
    <section id="image-pool" class="panel">
      <h2>Image Pool</h2>
      <p class="hint">Drag images into the hierarchy. Drop them back here to unassign.</p>
      <div id="pool-container" class="drop-zone" data-parent="root"></div>
    </section>

    <section id="hierarchy-panel" class="panel">
      <h2>Hierarchy</h2>
      <p class="hint">Drop on a red bar to insert as a sibling. Drop on an image to nest it as a child.</p>
      <div id="hierarchy-container" class="drop-zone hierarchy-root" data-parent="hierarchy-root"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
